<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <title>Frontend Mentor | Tip calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <form class="left">

      <!-- nav bill -->
      <div class="form-group">
        <label for="amount">Bill</label>
        <div class="input-group">
          <img src="images/icon-dollar.svg" class="icon">
          <input id="amount" type="text" required>
        </div>
      </div>

      <!-- pourcentages -->
      <div class="form-group">
        <label>Select Tip %</label>
        <div class="tips">
          <button type="button">5%</button>
          <button type="button">10%</button>
          <button type="button">15%</button>
          <button type="button">25%</button>
          <button type="button">50%</button>
          <input placeholder="Custom">
        </div>
      </div>

      <!-- nav people -->
      <div class="form-group">
        <label for="people">Number of People</label>
        <span class="error" id="people-error">Can´t be Zero </span>
        <div class="input-group">
          <img src="images/icon-person.svg" class="icon">
          <input id="people" type="text">
        </div>
      </div>

    </form>

    <!-- the second part -->
    <div class="right">

      <div class="result-block">
        <div>
          <p>Tip Amount</p>
          <span>/ person</span>
        </div>
        <h3 id="tip-amount">$0.00</h3>
      </div>

      <div class="result-block">
        <div>
          <p>Total</p>
          <span>/ person</span>
        </div>
        <h3 id="total">$0.00</h3>
      </div>

      <button type="reset" class="reset-btn">RESET</button>

    </div>

  </div>
  <script src="index.js"></script>
  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Gnaglo Date</a>.
  </footer>
</body>

</html>
